[mgr]
ratio = [0, 4, 6]
linemode = "mtime"

[opener]
play-audio = [
  { run = 'killall afplay 2>/dev/null; afplay "$1"', orphan = true, desc = "Play with afplay" },
]

[open]
prepend_rules = [
  { mime = "audio/*", use = "play-audio" },
]

[plugin]
prepend_previewers = [
  # Route all text files through bat; syntax mappings live in ~/.config/bat/config
  { mime = "text/*", run = "bat" },

  # Per-extension fallback:
  # { url = "*.cheat", run = "bat" },
  # { url = "*.ghostty", run = "bat" },
  # { url = "*.zsh-theme", run = "bat" },
]
