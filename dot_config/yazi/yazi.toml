[mgr]
ratio = [0, 4, 6]
linemode = "mtime"

[opener]
play-audio = [
  { run = 'killall afplay 2>/dev/null; afplay "$1"', orphan = true, desc = "Play with afplay" },
]

[open]
prepend_rules = [
  { mime = "audio/*", use = "play-audio" },
]

[plugin]
prepend_previewers = [
  # Route all text/application files through bat
  # Syntax mappings live in ~/.config/bat/config
  { mime = "text/*", run = "bat" },
  { mime = "application/*", run = "bat" },
]
