[mgr]
ratio = [0, 4, 6]
linemode = "mtime"

[opener]
play-audio = [
  { run = 'killall afplay 2>/dev/null; afplay "$1"', orphan = true, desc = "Play with afplay" },
]

[open]
prepend_rules = [
  { mime = "audio/*", use = "play-audio" },
]

[plugin]
prepend_preloaders = [
  # Pre-render markdown with Glow once, then peek from the cache on each scroll
  { url = "*.md", run = "glow" },
]

prepend_previewers = [
  # Render markdown files using Glow (must come before text/* to win over bat)
  { url = "*.md", run = "glow" },

  # Render files with the following MIME types using Bat
  # Syntax mappings live in ~/.config/bat/config
  { mime = "text/*", run = "bat" },
  { mime = "application/json", run = "bat" },
]
